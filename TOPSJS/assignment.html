    <meta charset="UTF-8">
    <meta name="viewport" content="width=<>, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<script>
        // arithmetic operator +, -, *, /, %, **
        var a=10;
         var b=10;
         document.write('<br> a + b is '+(a+b)) //13
         document.write('<br> a - b is '+(a-b)) //7
         document.write('<br> a * b is '+(a*b)) //30
         document.write('<br> a / b is '+(a/b)) //3.3333333333333335
         document.write('<br> a % b is '+(a%b)) //1
         document.write('<br> <hr> a ** b is '+(a**b)) //1000

        // shorthand +=, -=, *=, /=, %=, **= assignment oprators
        var a = 25;
        document.write('<br>a is '+(a))
        a+=2 // a=a+2
        document.write('<br>a is '+(a))
        a-=2 // a=a-2
        document.write('<br>a is '+(a))
        a*=2 // a=a*2
        document.write('<br> <hr> a is '+(a))
// relation / comparision operator >, <, >=, <=, ==, ===, !=, !==
var a = 35;
var b = "35";
document.write('<br> a > b is '+(a>b)) //35>35 false
document.write('<br> a < b is '+(a<b)) //35<35 false
document.write('<br> a >= b is '+(a>=b)) //35>=35 
document.write('<br> a <= b is '+(a<=b)) //35<=35 true
document.write('<br> a == b is '+(a==b)) //35=="35" true
document.write('<br> a === b is '+(a===b)) //35==="35" false
document.write('<br> a != b is '+(a!=b)) //35!=="35" false
 var a = true;
 var b = false;

document.write("<br> <hr>"+(a && b));
document.write("<br> "+(a || b));
document.write("<br>"+(!a));
</script>

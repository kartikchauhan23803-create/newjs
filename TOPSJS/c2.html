<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=>, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // es6 es7
        // arithmetic = + - * / % ** ++ -- , %modiles, ** exponentiation , ++ increment, -- decrement
        let a=25
        let b=10
        document.write('<br> addition is ',(a+b))
        document.write('<br> subtraction is ',(a-b))
        document.write('<br> multiplication is ',(a*b))
        document.write('<br> division is '+(a/b))
        document.write('<br> modulus is '+(a%b))
        // a*a*a
       document.write('<br> ** is '+(a**2));
        document.write('<hr>');
        document.write('<br> a is '+a) //25
        // ++ = +1 --=-1
        b=++a //postfix - old value
        document.write('<br> a is '+a) //26
        document.write('<br> b is '+a) //25

        b=++a //prefix - new value
        document.write('<br> a is '+a) //27
        document.write('<br> b is '+b) //27 

    </script>
</body>
</html>

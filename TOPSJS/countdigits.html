<body>
    <script>
        // total digits
        //sum of digits
        let no=451 //4 5 1
        let count=0
        let sum=0
        while(no>0){ //0>0
            let r = no%10 //451%10 =1 45%10=5 5%10=5
            no=Math.floor(no/10) //451/10=45 45/10=4.5=4 4/10=0
            count +=1 //count=count+1//count++ //1 2 3
            sum = sum+r
        }
        document.write('<br>totaL digits are '+count)
        document.write('<br>Sum of digits are '+sum)
        
    </script>
</body>

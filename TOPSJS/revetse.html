    <script>
        // palindrom no
        let no=1221
        // reverse no
        let rev=0
        let f=no
        while(no>0)
    {
        let r=no%10 //8 4 1
        console.log("reminder is "+r);
        no = Math.floor(no/10);
        console.log("number is " +no);
        rev=(rev*10) +r //0*10+8=8 8*10+4=84 84*10+1=841
        document.write('<br>reverse no is '+rev)
    }
    if(f==rev)
    {
        document.write('<br>palindrom no')
    }
    else
    {
        document.write('<br>not palindrom no')
    }
    </script>

     <script>
        let ch='I'
        switch(ch){
            case 'a':
            case 'e':
            case 'i':
            case 'o':
            case 'u': 
            case 'A':
            case 'E':
            case 'I':   
            case 'O':

                     break
            default:document.write('<br>Consonant')
                    break
        }
    </script>
